<div class="container py-5 d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 160px);">
    <div class="card shadow-lg border-0 p-4 fade-in" style="max-width: 450px; width: 100%; border-radius: 16px;">
        <div class="card-body">
            <!-- Logo y Cabecera -->
            <div class="text-center mb-4">
                <div class="logo-circle mx-auto mb-3" style="width: 60px; height: 60px; font-size: 1.8rem;">
                    <span>🚀</span>
                </div>
                <h1 class="h3 fw-bold mb-1">¡Hola de nuevo!</h1>
                <p class="text-muted">Inicia sesión en tu cuenta de FoodJet</p>
            </div>

            <!-- Panel de Demo -->
            <div class="alert alert-info border-0 p-3 mb-4"
                style="background-color: var(--primary-light); color: var(--dark-color); border-radius: 12px;">
                <p class="small mb-2">🎯 <strong>Modo Demo:</strong> Ingresa cualquier nombre o usa el botón de acceso
                    rápido.</p>
                <button type="button" class="btn btn-sm btn-outline-primary w-100" (click)="quickLogin()"
                    style="border-width: 2px;">
                    Acceso Demo Rápido
                </button>
            </div>

            <p class="text-center text-muted small mb-3">Para acceder como administrador, usa el email <strong>"admin@foodjet.com"</strong>.</p>

            <!-- Formulario de Login -->
            <form (submit)="onSubmit($event)">
                <div class="mb-3">
                    <label for="loginEmail" class="form-label fw-bold small">
                        <i class="bi bi-envelope me-2"></i>Email
                    </label>
                    <input type="email" class="form-control py-2" id="loginEmail" name="email" [(ngModel)]="email"
                        placeholder="tu@email.com" required style="border-radius: 8px;">
                </div>

                <div class="mb-3">
                    <label for="loginPassword" class="form-label fw-bold small">
                        <i class="bi bi-lock me-2"></i>Contraseña
                    </label>
                    <input type="password" class="form-control py-2" id="loginPassword" name="password"
                        [(ngModel)]="password" placeholder="••••••••" style="border-radius: 8px;">
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2.5 mt-3"
                    style="border-radius: 8px; font-weight: 600;">
                    Ingresar <i class="bi bi-box-arrow-in-right ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-4">
                <small class="text-muted">¿No tienes cuenta? <a routerLink="/register" class="text-decoration-none fw-bold"
                        style="color: var(--primary-hover);">Regístrate aquí</a></small>
            </div>
        </div>
    </div>
</div>
